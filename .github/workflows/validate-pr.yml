name: Validate PR

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  validate:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Secret safety guard
        run: node scripts/ci-secret-guard.mjs

      - name: Run tests
        run: npm test

      - name: Build static site
        env:
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SPOTIFY_CONNECT_URL: ${{ vars.SPOTIFY_CONNECT_URL || secrets.SPOTIFY_CONNECT_URL }}
          SPOTIFY_RECOMMENDATIONS_ENDPOINT: ${{ vars.SPOTIFY_RECOMMENDATIONS_ENDPOINT || secrets.SPOTIFY_RECOMMENDATIONS_ENDPOINT }}
        run: npm run build

      # - name: Enforce token gate
      #   run: npm run token:gate
