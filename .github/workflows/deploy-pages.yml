name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    types: [closed]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Secret safety guard
        run: node scripts/ci-secret-guard.mjs

      - name: Run tests
        run: npm test

      # - name: Enforce token gate
      #   run: npm run token:gate

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare static files
        env:
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          mkdir -p dist/src
          cp index.html dist/
          if [ -f favicon.svg ]; then cp favicon.svg dist/; fi
          cp -r src/* dist/src/
          cp .nojekyll dist/
          python3 - <<'PY'
          import os
          from pathlib import Path

          path = Path('dist/src/config/supabaseConfig.js')
          content = path.read_text(encoding='utf-8')
          publishable_key = os.environ.get('SUPABASE_PUBLISHABLE_KEY', '')

          if publishable_key:
              content = content.replace('__SUPABASE_PUBLISHABLE_KEY__', publishable_key)
              path.write_text(content, encoding='utf-8')
              print('Injected Supabase publishable key into deploy artifact.')
          else:
              print('No Supabase publishable key secret is set; leaving placeholder in config.')
          PY

      - name: Auto-commit tracked changes
        run: |
          if [ "${{ github.actor }}" = "github-actions[bot]" ]; then
            echo "Workflow triggered by bot actor; skipping auto-commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -u

          if git diff --cached --quiet; then
            echo "No tracked changes to commit."
            exit 0
          fi

          git commit -m "ci: auto-commit tracked changes after green checks"
          git push

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
