name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    types: [closed]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Secret safety guard
        run: node scripts/ci-secret-guard.mjs

      - name: Run tests
        run: npm test

      - name: Build static site
        env:
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SPOTIFY_CONNECT_URL: ${{ vars.SPOTIFY_CONNECT_URL || secrets.SPOTIFY_CONNECT_URL }}
          SPOTIFY_RECOMMENDATIONS_ENDPOINT: ${{ vars.SPOTIFY_RECOMMENDATIONS_ENDPOINT || secrets.SPOTIFY_RECOMMENDATIONS_ENDPOINT }}
        run: npm run build

      # - name: Enforce token gate
      #   run: npm run token:gate

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Auto-commit tracked changes
        run: |
          if [ "${{ github.actor }}" = "github-actions[bot]" ]; then
            echo "Workflow triggered by bot actor; skipping auto-commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -u

          if git diff --cached --quiet; then
            echo "No tracked changes to commit."
            exit 0
          fi

          git commit -m "ci: auto-commit tracked changes after green checks"
          git push

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
