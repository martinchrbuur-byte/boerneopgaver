<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />

    <script type="importmap">

          "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.100.1"
        }
      }
    </script>
  </head>
  <body>
    <main id="app"></main>
    <script>
      // 🔑 Supabase Configuration
      // Get your publishable key from: https://app.supabase.com/project/mfydufcizonxjmgyrwkj/settings/api
      // Replace the placeholder below with your actual key
      window.SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_PjWLuUDMIhXQx_KoX4ZhAg_bOxEQXym';
      
      // Or load from localStorage if already set:
      if (!window.SUPABASE_PUBLISHABLE_KEY || 
          window.SUPABASE_PUBLISHABLE_KEY.startsWith('__')) {
        const storedKey = localStorage.getItem('SUPABASE_PUBLISHABLE_KEY');
        if (storedKey && !storedKey.startsWith('__')) {
          window.SUPABASE_PUBLISHABLE_KEY = storedKey;
        }
      }
    </script>
    <script type="module" src="./src/app.js"></script>
